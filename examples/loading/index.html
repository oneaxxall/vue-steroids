<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue Steroids - Demo Loading State</title>
    <!-- Memuat bundle Vue Steroids yang baru di-build -->
    <script src="../../dist/vue.js"></script>
    <style>
        body { 
            background: #e9ecef; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }
        #app { 
            width: 100%; 
            max-width: 550px; 
        }
        .info-box {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border: 1px solid #ffeeba;
            border-radius: 8px;
            font-size: 0.85em;
            color: #856404;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Komponen Utama -->
        <app-loader />

        <div class="info-box">
            <strong>Penjelasan:</strong> Ketika Anda me-refresh halaman, framework akan memuat <code>App.tpl</code>. 
            Karena di dalam <code>App.tpl</code> terdapat <code>asyncComponents</code>, maka template <code>scope="loading"</code> 
            akan dirender terlebih dahulu sampai file <code>SlowBox.tpl</code> selesai di-load via AJAX.
        </div>
    </div>

    <script>
        // 1. Konfigurasi Vue Steroids
        Vue.config.debug = true;
        Vue.config.componentPath = ''; // Root path relatif terhadap file ini
        Vue.config.componentExtension = '.tpl';

        // 2. Load Entry Point
        // Kita memuat 'app-loader' secara dinamis
        Vue.loadAsyncComponent('app-loader', '/examples/loading/App').then(() => {
            console.log('App component loaded, initializing Vue...');
            new Vue({
                el: '#app',
                mounted() {
                    console.log('Aplikasi siap.');
                }
            });
        }).catch(err => {
            console.error('Error loading app:', err);
            document.getElementById('app').innerHTML = '<div style="color:red">Error: Jalankan via Web Server untuk memuat file .tpl</div>';
        });
    </script>
</body>
</html>
